services:
  local-model-pro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-model-pro
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      DEFAULT_MODEL: qwen2.5:7b
      DEFAULT_TEMPERATURE: "0.2"
      DEFAULT_NUM_CTX: "4096"
      DEFAULT_ACTOR_ID: "anonymous"
      WORKSPACE_ROOT: /workspace
      FILESYSTEM_TOOLS_ENABLED: "true"
      TERMINAL_TOOLS_ENABLED: "true"
      TERMINAL_REQUIRE_CONFIRM: "true"
      TERMINAL_TIMEOUT_SECONDS: "25"
      TERMINAL_MAX_OUTPUT_BYTES: "60000"
      FS_READ_MAX_BYTES: "120000"
      FS_LIST_MAX_ENTRIES: "400"
      FS_FIND_MAX_RESULTS: "60"
      FS_SUMMARY_MAX_FILES: "8"
      FS_SUMMARY_FILE_CHARS: "2400"
      ADMIN_STATE_PATH: /workspace/data/admin_profile_state.json
      DEVFLOW_ENABLED: "true"
      DEVFLOW_MAX_CONCURRENT_JOBS: "1"
      DEVFLOW_ROLE_TIMEOUT_SECONDS: "90"
      DEVFLOW_RUN_RETENTION: "30"
      DEVFLOW_ARTIFACT_DIR: /workspace/data/devflow_runs
    ports:
      - "8765:8765"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/workspace
