<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Model Pro</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body data-theme="aurora-dusk">
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>Local Model Pro</h1>
          <p>Browser chat console with live Ollama model switching.</p>
        </div>
        <div id="statusBadge" class="status-pill status-pill-offline">offline</div>
      </header>

      <div class="workspace-grid">
        <section class="card panel">
          <h2>Model Control</h2>

          <div class="field">
            <div class="field-head">
              <span>Downloaded models</span>
              <button id="refreshModelsBtn" type="button">Refresh</button>
            </div>
            <input
              id="modelFilterInput"
              type="text"
              placeholder="Filter models..."
              autocomplete="off"
            />
            <select id="modelSelect" size="8" aria-label="Downloaded models"></select>
            <div id="modelListMeta" class="field-help"></div>
          </div>

          <div class="field">
            <span>Manual model tag (optional)</span>
            <div class="row">
              <input
                id="customModelInput"
                type="text"
                placeholder="example: qwen2.5:7b"
                autocomplete="off"
              />
              <button id="applyModelBtn" type="button">Use Model</button>
            </div>
          </div>

          <div class="row actions">
            <button id="connectBtn" type="button">Connect</button>
            <button id="resetBtn" type="button">Reset Chat</button>
          </div>

          <div id="activeModelLabel" class="active-model">model: n/a</div>
        </section>

        <section class="card terminal-section">
          <h2>Chat Console</h2>
          <div id="chatLog" class="chat-log" aria-live="polite"></div>
          <form id="chatForm" class="composer">
            <textarea
              id="promptInput"
              rows="3"
              placeholder="Ask anything... (Enter to send, Shift+Enter for newline)"
            ></textarea>
            <button id="sendBtn" type="submit">Send</button>
          </form>
        </section>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
